model_family: tinyllama
model_path: null   # 必须占位（由 sh 覆盖）

# LoRA 配置
LoRA:
  use: true
  targets: all
  r: 0
  alpha: 32
  dropout: 0.0

# 训练参数
lr: 1e-5
batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 1
weight_decay: 0.01

# 数据相关
split: forget01        # 占位，会被 sh 覆盖
data_path: ${data_path}       # 不用 HF 数据就设为 null
forget_file: null      # 推荐你用这个（如果 data_module 支持）
retain_file: null

# 遗忘相关（核心）
forget_loss: GA        # GA / IHL / KL / grad_ascent 等
importance_file: null  # ⚠️ GA 必须是 null，否则会触发 FILA

# NPO / KL / grad_diff 等超参数（必须占位）
npo_coeff: 1.0
grad_diff_coeff: 1.0
KL_coeff: 1.0
ref_policy: fine_tuned
beta: 0.1

# 输出控制
save_dir: ./outputs    # ⚠️ 不要依赖 model_path 拼接
overwrite_dir: true
save_model: true

# 训练控制
seed: 42
eval_while_train: false
eval_only: false

# Eval 配置（不影响训练，但必须完整）
eval:
  model_path: ${..model_path}
  model_family: ${..model_family}
  save_dir: ${..save_dir}

  data_path: [TOFU\data,TOFU\data, TOFU\data, TOFU\data]

  split: ${..split}_perturbed
  split_list:
    - retain_perturbed
    - real_authors_perturbed
    - world_facts_perturbed
    - ${..split}

  eval_task:
    - eval_log
    - eval_real_author_wo_options
    - eval_real_world_wo_options
    - eval_log_forget

  question_key: [question, question, question, question]
  answer_key: [answer, answer, answer, answer]
  base_answer_key: [paraphrased_answer, answer, answer, paraphrased_answer]
  perturbed_answer_key: [perturbed_answer, perturbed_answer, perturbed_answer, perturbed_answer]

  generation:
    max_length: 200
    max_new_tokens: null

  save_generated_text: true
  ds_size: 300
  overwrite: true
  use_pretrained: false
  batch_size: 30
  retain_result: null